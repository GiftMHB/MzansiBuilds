services:
  postgres:
    image: postgres:16-alpine
    container_name: mzansi_builds_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: mzansi_builds
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/migrations:/docker-entrypoint-initdb.d/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: mzansi_builds_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mzansi.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "127.0.0.1:5050:80"
    depends_on:
      - postgres

  mailhog:
    image: mailhog/mailhog
    container_name: mzansi_builds_mail
    ports:
       - "127.0.0.1:1025:1025"
       - "127.0.0.1:8025:8025"
    restart: unless-stopped

volumes:
  postgres_data: